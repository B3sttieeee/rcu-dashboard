<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Golf Online P2P | B3sttieeee</title>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <style>
        :root { --p-green: #2ecc71; --p-dark: #1a1a2e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--p-dark); color: white; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; background: #27ae60; cursor: crosshair; }
        
        #ui-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; justify-content: center; align-items: center; }
        .menu { background: rgba(0,0,0,0.9); padding: 30px; border-radius: 20px; text-align: center; border: 2px solid var(--p-green); pointer-events: auto; }
        .hidden { display: none !important; }
        
        button { padding: 10px 20px; margin: 5px; border: none; border-radius: 5px; background: var(--p-green); font-weight: bold; cursor: pointer; }
        input { padding: 10px; border-radius: 5px; border: none; margin-bottom: 10px; width: 200px; }
        
        #hud { position: fixed; top: 20px; left: 20px; font-weight: bold; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; }
        #connection-status { position: fixed; top: 20px; right: 20px; font-size: 0.8rem; color: #aaa; }
    </style>
</head>
<body>

    <canvas id="golfCanvas"></canvas>

    <div id="ui-overlay">
        <!-- MENU GŁÓWNE -->
        <div id="main-menu" class="menu">
            <h1>GOLF P2P</h1>
            <p style="margin-bottom: 20px;">Graj lokalnie lub ze znajomym</p>
            <button onclick="startLocal()">Graj Sam (Trening)</button>
            <hr style="margin: 20px; border-color: #333;">
            <button style="background: #3498db;" onclick="initHost()">Stwórz Pokój (Host)</button>
            <button style="background: #9b59b6;" onclick="showJoinMenu()">Dołącz do znajomego</button>
        </div>

        <!-- MENU HOSTA -->
        <div id="host-menu" class="menu hidden">
            <h2>Twój Kod Pokoju:</h2>
            <h1 id="my-id" style="color: #f1c40f; margin: 20px 0;">Ładowanie...</h1>
            <p>Wyślij ten kod znajomemu.</p>
            <p id="wait-msg">Czekanie na połączenie...</p>
        </div>

        <!-- MENU DOŁĄCZANIA -->
        <div id="join-menu" class="menu hidden">
            <h2>Wpisz Kod Znajomego:</h2>
            <input type="text" id="join-id" placeholder="np. abc-123-xyz"><br>
            <button onclick="connectToHost()">Połącz i Graj</button>
            <button style="background: #e74c3c;" onclick="location.reload()">Anuluj</button>
        </div>
    </div>

    <div id="hud" class="hidden">
        Uderzenia: <span id="strokes">0</span> | Gracz: <span id="player-role">---</span>
    </div>
    <div id="connection-status">Niepołączony</div>

    <script>
        const canvas = document.getElementById('golfCanvas');
        const ctx = canvas.getContext('2d');
        const hud = document.getElementById('hud');
        
        // --- STANY GRY ---
        let ball = { x: 100, y: 100, vx: 0, vy: 0, radius: 10, friction: 0.98, color: 'white' };
        let opponentBall = { x: 100, y: 100, vx: 0, vy: 0, radius: 10, color: '#e74c3c' }; // Czerwona piłka wroga
        let hole = { x: 0, y: 0, radius: 20 };
        let isDragging = false;
        let strokes = 0;
        let isMultiplayer = false;
        let role = 'local'; // 'host', 'guest', 'local'

        // --- P2P LOGIKA (PeerJS) ---
        let peer, conn;

        function initHost() {
            role = 'host';
            peer = new Peer(); 
            peer.on('open', (id) => {
                document.getElementById('my-id').innerText = id;
                showMenu('host-menu');
            });
            peer.on('connection', (c) => {
                conn = c;
                setupConnection();
            });
        }

        function showJoinMenu() { showMenu('join-menu'); }

        function connectToHost() {
            role = 'guest';
            const targetId = document.getElementById('join-id').value;
            peer = new Peer();
            peer.on('open', () => {
                conn = peer.connect(targetId);
                setupConnection();
            });
        }

        function setupConnection() {
            conn.on('open', () => {
                document.getElementById('connection-status').innerText = "POŁĄCZONO";
                document.getElementById('ui-overlay').classList.add('hidden');
                hud.classList.remove('hidden');
                document.getElementById('player-role').innerText = role === 'host' ? "HOST" : "GOŚĆ";
                isMultiplayer = true;
                startGame();
            });
            conn.on('data', (data) => {
                if (data.type === 'sync') {
                    opponentBall.x = data.x;
                    opponentBall.y = data.y;
                }
            });
        }

        // --- MECHANIKA GOLFA ---
        function startLocal() {
            role = 'local';
            document.getElementById('ui-overlay').classList.add('hidden');
            hud.classList.remove('hidden');
            document.getElementById('player-role').innerText = "SOLO";
            startGame();
        }

        function startGame() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            hole.x = canvas.width - 150;
            hole.y = canvas.height / 2;
            ball.y = canvas.height / 2;
            opponentBall.y = canvas.height / 2;
            animate();
        }

        canvas.addEventListener('mousedown', (e) => {
            if (Math.hypot(e.clientX - ball.x, e.clientY - ball.y) < 30 && ball.vx === 0 && ball.vy === 0) {
                isDragging = true;
            }
        });

        window.addEventListener('mouseup', (e) => {
            if (isDragging) {
                ball.vx = (ball.x - e.clientX) * 0.15;
                ball.vy = (ball.y - e.clientY) * 0.15;
                strokes++;
                document.getElementById('strokes').innerText = strokes;
                isDragging = false;
            }
        });

        function update() {
            ball.x += ball.vx; ball.y += ball.vy;
            ball.vx *= ball.friction; ball.vy *= ball.friction;
            if (Math.abs(ball.vx) < 0.1) ball.vx = 0;
            if (Math.abs(ball.vy) < 0.1) ball.vy = 0;

            // Ściany
            if (ball.x < 0 || ball.x > canvas.width) ball.vx *= -0.7;
            if (ball.y < 0 || ball.y > canvas.height) ball.vy *= -0.7;

            // SYNC DO KOLEGI
            if (isMultiplayer && conn && conn.open) {
                conn.send({ type: 'sync', x: ball.x, y: ball.y });
            }

            if (Math.hypot(ball.x - hole.x, ball.y - hole.y) < hole.radius && Math.abs(ball.vx) < 1) {
                alert("Wygrałeś!");
                location.reload();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Dołek
            ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(hole.x, hole.y, hole.radius, 0, Math.PI*2); ctx.fill();
            // Przeciwnik
            if(isMultiplayer) {
                ctx.fillStyle = opponentBall.color; ctx.globalAlpha = 0.6;
                ctx.beginPath(); ctx.arc(opponentBall.x, opponentBall.y, opponentBall.radius, 0, Math.PI*2); ctx.fill();
                ctx.globalAlpha = 1.0;
            }
            // Ty
            ctx.fillStyle = ball.color; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2); ctx.fill();
        }

        function animate() {
            update(); draw(); requestAnimationFrame(animate);
        }

        function showMenu(id) {
            document.querySelectorAll('.menu').forEach(m => m.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
