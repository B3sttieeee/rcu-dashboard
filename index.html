<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B3sttieeee | Real Black Hole</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            overflow: hidden; 
        }
        #canvas-container { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: 1; 
        }
        
        /* UI */
        nav { 
            position: fixed; 
            top: 0; 
            width: 100%; 
            padding: 25px 40px; 
            z-index: 100; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .logo { 
            font-weight: 900; 
            letter-spacing: 5px; 
            font-size: 1.35rem; 
            background: linear-gradient(90deg, #ffffff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        nav ul { 
            display: flex; 
            list-style: none; 
            gap: 35px; 
        }
        nav a { 
            color: #ddd; 
            text-decoration: none; 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            opacity: 0.7; 
            transition: all 0.3s;
        }
        nav a:hover { 
            opacity: 1; 
            color: #fff; 
            text-shadow: 0 0 15px rgba(168, 85, 247, 0.6);
        }

        main { 
            position: relative; 
            z-index: 10; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            pointer-events: none;
        }
        .hero-content {
            text-align: center; 
            background: rgba(0,0,0,0.45); 
            padding: 70px 80px; 
            border-radius: 40px;
            backdrop-filter: blur(22px); 
            border: 1px solid rgba(168, 85, 247, 0.25); 
            pointer-events: auto;
            box-shadow: 0 0 60px rgba(0,0,0,0.7);
            max-width: 620px;
        }
        h1 { 
            font-size: 3.8rem; 
            margin-bottom: 12px; 
            font-weight: 900; 
            letter-spacing: -3px; 
            line-height: 1.1;
        }
        p { 
            color: #aaa; 
            margin-bottom: 40px; 
            font-size: 1.15rem; 
        }
        .btn {
            padding: 16px 52px; 
            background: #fff; 
            color: #000; 
            text-decoration: none;
            border-radius: 50px; 
            font-weight: 800; 
            transition: all 0.4s; 
            display: inline-block;
            text-transform: uppercase; 
            letter-spacing: 1.5px;
            font-size: 0.95rem;
        }
        .btn:hover { 
            transform: scale(1.06); 
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.7); 
            background: #a855f7; 
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <nav>
        <div class="logo">B3STTIEEEE</div>
        <ul>
            <li><a href="#">Baza Danych</a></li>
            <li><a href="#">Łączność</a></li>
            <li><a href="#">Repozytorium</a></li>
        </ul>
    </nav>

    <main>
        <div class="hero-content">
            <h1>SYSTEM ONLINE</h1>
            <p>Eksploracja horyzontu zdarzeń w toku...</p>
            <a href="https://github.com/B3sttieeee" target="_blank" class="btn">Autoryzuj Dostęp</a>
        </div>
    </main>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.168.0';

        let scene, camera, renderer;
        let blackHole, accretionDisk, photonRing, glowMesh, stars;

        let targetX = 0, targetY = 0;
        let time = 0;

        function createStarField() {
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const colors = [];
            const color = new THREE.Color();

            for (let i = 0; i < 12000; i++) {
                const x = THREE.MathUtils.randFloatSpread(4000);
                const y = THREE.MathUtils.randFloatSpread(4000);
                const z = THREE.MathUtils.randFloatSpread(4000);
                positions.push(x, y, z);

                const brightness = Math.random();
                color.setHSL(0.6, 0.1, brightness);
                colors.push(color.r, color.g, color.b);
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 1.8,
                vertexColors: true,
                transparent: true,
                opacity: 0.9,
                depthTest: false
            });

            stars = new THREE.Points(geometry, material);
            scene.add(stars);
        }

        function init() {
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000);
            camera.position.set(0, 80, 520);

            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: false 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // === CZARNA DZIURA (Event Horizon) ===
            const bhGeometry = new THREE.SphereGeometry(78, 64, 64);
            const bhMaterial = new THREE.MeshBasicMaterial({ 
                color: 0x000000 
            });
            blackHole = new THREE.Mesh(bhGeometry, bhMaterial);
            scene.add(blackHole);

            // Poświata zewnętrzna
            const glowGeo = new THREE.SphereGeometry(92, 64, 64);
            const glowMat = new THREE.MeshBasicMaterial({
                color: 0x9f6bff,
                transparent: true,
                opacity: 0.18,
                blending: THREE.AdditiveBlending,
                side: THREE.BackSide
            });
            glowMesh = new THREE.Mesh(glowGeo, glowMat);
            scene.add(glowMesh);

            // === PIERŚCIEŃ FOTONOWY ===
            const ringGeo = new THREE.RingGeometry(95, 108, 128);
            const ringMat = new THREE.MeshBasicMaterial({
                color: 0xffddaa,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.75,
                blending: THREE.AdditiveBlending
            });
            photonRing = new THREE.Mesh(ringGeo, ringMat);
            photonRing.rotation.x = -Math.PI / 2.1;
            scene.add(photonRing);

            // === DYSK AKRECYJNY (lepsza wersja) ===
            const particleCount = 32000;
            const positions = [];
            const colors = [];
            const sizes = [];
            const col = new THREE.Color();

            for (let i = 0; i < particleCount; i++) {
                const radius = 92 + Math.random() * 280;
                const angle = Math.random() * Math.PI * 2;

                const x = radius * Math.cos(angle);
                const z = radius * Math.sin(angle);
                
                // Lekkie zaburzenie wysokości dysku + efekt relatywistyczny
                const y = Math.sin(radius * 0.018) * 38 + (Math.random() - 0.5) * 14;

                positions.push(x, y, z);

                // Gradient temperatury (gorący wewnątrz → chłodniejszy na zewnątrz)
                const heat = Math.pow((radius - 92) / 280, 1.6);
                if (heat < 0.25) {
                    col.set(0xfff0e0);           // bardzo gorący
                } else if (heat < 0.55) {
                    col.set(0xffaa44);
                } else {
                    col.set(0x9955ff);           // fioletowo-niebieski
                }

                colors.push(col.r, col.g, col.b);
                sizes.push(Math.random() * 4.5 + 2.2);
            }

            const diskGeometry = new THREE.BufferGeometry();
            diskGeometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            diskGeometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            diskGeometry.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));

            const diskMaterial = new THREE.PointsMaterial({
                size: 5.5,
                vertexColors: true,
                transparent: true,
                opacity: 0.92,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            accretionDisk = new THREE.Points(diskGeometry, diskMaterial);
            scene.add(accretionDisk);

            createStarField();

            window.addEventListener('resize', onResize);
            window.addEventListener('mousemove', onMouseMove);

            animate();
        }

        function onMouseMove(e) {
            targetX = (e.clientX - window.innerWidth / 2) * 0.8;
            targetY = (e.clientY - window.innerHeight / 2) * 0.6;
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            time = Date.now() * 0.001;

            // Rotacja dysku + subtelne falowanie
            accretionDisk.rotation.y = time * 0.18;
            accretionDisk.rotation.z = Math.sin(time * 0.12) * 0.07;

            // Delikatna rotacja pierścienia fotonowego
            photonRing.rotation.z = time * 0.25;

            // Pulsowanie poświaty
            const pulse = 1 + Math.sin(time * 3.5) * 0.07;
            glowMesh.scale.setScalar(pulse);

            // Płynna kamera
            camera.position.x += (targetX - camera.position.x) * 0.035;
            camera.position.y += (-targetY * 0.6 - camera.position.y) * 0.035;
            camera.lookAt(0, 15, 0);

            // Lekka rotacja gwiazd tła
            if (stars) stars.rotation.y = time * 0.0008;

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
