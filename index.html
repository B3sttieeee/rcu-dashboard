<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B3sttieeee | Event Horizon ULTRA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* UI - Minimalistyczna kapsuła na dole */
        main { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; z-index: 10; pointer-events: none; }
        .hero-content { 
            text-align: center; background: rgba(0,0,0,0.4); padding: 20px 50px; border-radius: 50px; 
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); pointer-events: auto;
        }
        h1 { font-size: 1.2rem; letter-spacing: 3px; font-weight: 900; color: #ffaa00; }
        .btn { color: #fff; text-decoration: none; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; transition: 0.3s; }
        .btn:hover { opacity: 1; text-shadow: 0 0 10px #fff; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <main>
        <div class="hero-content">
            <h1>SYSTEM ONLINE</h1>
            <a href="https://github.com/B3sttieeee" class="btn">Archiwum GitHuba</a>
        </div>
    </main>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';

        let scene, camera, renderer, disk, stars, suns = [];

        // Tworzenie "miękkiej" tekstury dla cząsteczek plazmy
        function createSoftTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            grad.addColorStop(0, 'rgba(255,255,255,1)');
            grad.addColorStop(0.3, 'rgba(255,255,255,0.3)');
            grad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 20000);
            camera.position.set(0, 250, 700);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 1. CZARNA DZIURA
            const bhGeo = new THREE.SphereGeometry(100, 64, 64);
            const bhMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const blackHole = new THREE.Mesh(bhGeo, bhMat);
            scene.add(blackHole);

            // 2. ULTRA DYSK AKRECYJNY (60 000 cząsteczek)
            const count = 60000;
            const diskGeo = new THREE.BufferGeometry();
            const positions = [];
            const colors = [];
            const sizes = [];
            const color = new THREE.Color();

            for (let i = 0; i < count; i++) {
                const r = Math.random() * 500 + 110;
                const theta = Math.random() * Math.PI * 2;
                
                // Matematyczne wygięcie grawitacyjne (Interstellar Warp)
                const x = r * Math.cos(theta);
                const z = r * Math.sin(theta);
                const y = (Math.sin(r * 0.008) * 80) * Math.cos(theta * 0.5) + (Math.random() - 0.5) * 12;

                positions.push(x, y, z);

                // Gradacja kolorów ognia
                const dist = (r - 110) / 500;
                if (dist < 0.15) color.setHex(0xffffff); // Jądro
                else if (dist < 0.5) color.setHex(0xffaa00); // Złoto
                else if (dist < 0.8) color.setHex(0xff4400); // Ogień
                else color.setHex(0x441100); // Ciemny żar
                
                colors.push(color.r, color.g, color.b);
                sizes.push(Math.random() * 8 + 3);
            }

            diskGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            diskGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            diskGeo.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));

            const diskMat = new THREE.PointsMaterial({
                size: 5,
                map: createSoftTexture(),
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending, // Nakładanie kolorów (świetlistość)
                depthWrite: false // Zapobiega "szparom" i błędom głębi
            });

            disk = new THREE.Points(diskGeo, diskMat);
            scene.add(disk);

            // 3. OLBRZYMY (System słońc w oddali)
            const sunsData = [
                { color: 0x66aaff, size: 400, pos: [2000, 500, -2000] }, // Syriusz (Błękitny)
                { color: 0xff4400, size: 600, pos: [-3000, -200, -1000] }, // Betelgeza (Czerwony)
                { color: 0xffffff, size: 150, pos: [1000, -1000, 1500] }  // Biały karzeł
            ];

            sunsData.forEach(data => {
                const sMat = new THREE.SpriteMaterial({
                    map: createSoftTexture(),
                    color: data.color,
                    blending: THREE.AdditiveBlending,
                    transparent: true,
                    opacity: 0.9
                });
                const sprite = new THREE.Sprite(sMat);
                sprite.position.set(...data.pos);
                sprite.scale.set(data.size, data.size, 1);
                scene.add(sprite);
                suns.push(sprite);
            });

            // 4. GWIAZDY TŁA (15 000 punktów)
            const sGeo = new THREE.BufferGeometry();
            const sPos = [];
            for (let i = 0; i < 15000; i++) {
                sPos.push((Math.random() - 0.5) * 10000, (Math.random() - 0.5) * 10000, (Math.random() - 0.5) * 10000);
            }
            sGeo.setAttribute('position', new THREE.Float32BufferAttribute(sPos, 3));
            stars = new THREE.Points(sGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 1.5, transparent: true, opacity: 0.4 }));
            scene.add(stars);

            animate();
        }

        let mouseX = 0, mouseY = 0;
        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX - window.innerWidth / 2) * 0.2;
            mouseY = (e.clientY - window.innerHeight / 2) * 0.2;
        });

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.0005;

            disk.rotation.y += 0.005;
            
            // Pulsowanie olbrzymów
            suns.forEach((sun, i) => {
                const pulse = 1 + Math.sin(time * 2 + i) * 0.1;
                sun.scale.set(pulse * (i===1 ? 600 : 300), pulse * (i===1 ? 600 : 300), 1);
            });

            // Płynna kamera 3D
            camera.position.x += (mouseX - camera.position.x) * 0.05;
            camera.position.y += (-mouseY + 250 - camera.position.y) * 0.05;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
