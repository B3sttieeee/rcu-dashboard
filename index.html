<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA 1v1 | Next-Gen Web Combat</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="app"></div>

    <!-- UI LAYER -->
    <div id="ui">
        <div class="crosshair"></div>
        
        <div id="stats">
            <div class="hp-bar"><div id="hp-fill"></div></div>
            <div class="ammo">30 / ∞</div>
        </div>

        <div id="inventory">
            <div class="slot active" data-slot="1">1</div>
            <div class="slot" data-slot="2">2</div>
            <div class="slot" data-slot="3">3</div>
            <div class="slot" data-slot="4">🔨</div>
        </div>

        <div id="overlay">
            <div class="menu-card">
                <h1>ALPHA 1V1</h1>
                <button id="btn-start">WEJDŹ DO GRY</button>
                <button id="btn-multi" class="btn-sec">MULTIPLAYER</button>
            </div>
        </div>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
