<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>PUTT PARTY CLONE | B3sttieeee</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="ui">
        <!-- TOP HUD (Odwzorowany ze screenów) -->
        <div id="hud-top" class="hidden">
            <div class="hud-item">HOLE <span id="val-hole">1</span></div>
            <div class="hud-item">PAR <span id="val-par">3</span></div>
            <div class="hud-item accent">STROKE <span id="val-stroke">0</span></div>
            <div class="hud-item">TIMER <span id="val-timer">1:55</span></div>
        </div>

        <!-- MENU GŁÓWNE -->
        <div id="menu-main" class="panel">
            <h1 class="logo-text">PUTT PARTY</h1>
            <div class="btn-group">
                <button onclick="Game.start()">GRAJ SOLO</button>
                <button class="btn-secondary" onclick="Multi.initHost()">HOSTUJ POKÓJ</button>
                <button class="btn-secondary" onclick="UI.showJoin()">DOŁĄCZ DO EKIPY</button>
            </div>
        </div>

        <!-- JOIN MENU -->
        <div id="menu-join" class="panel hidden">
            <h3>WPISZ KOD LOBBY</h3>
            <input type="text" id="join-id" placeholder="np. 892-abc">
            <button onclick="Multi.join()">POŁĄCZ</button>
            <button class="btn-back" onclick="location.reload()">POWRÓT</button>
        </div>

        <!-- POWER BAR (Wskaźnik siły uderzenia) -->
        <div id="power-container" class="hidden">
            <div id="power-fill"></div>
        </div>
    </div>

    <script src="js/physics.js"></script>
    <script src="js/multiplayer.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
