<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B3sttieeee | Real Black Hole 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* UI */
        nav { position: fixed; top: 0; width: 100%; padding: 25px; z-index: 100; display: flex; justify-content: center; }
        .nav-content { display: flex; justify-content: space-between; width: 100%; max-width: 1200px; padding: 0 20px; align-items: center; }
        .logo { font-weight: 900; letter-spacing: 4px; font-size: 1.2rem; background: linear-gradient(to right, #fff, #8a2be2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        nav ul { display: flex; list-style: none; gap: 30px; }
        nav a { color: #fff; text-decoration: none; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; transition: 0.3s; }
        nav a:hover { opacity: 1; text-shadow: 0 0 10px #fff; }

        main { position: relative; z-index: 10; width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .hero-content { 
            text-align: center; background: rgba(0,0,0,0.4); padding: 60px; border-radius: 40px; 
            backdrop-filter: blur(20px); border: 1px solid rgba(138, 43, 226, 0.2); pointer-events: auto;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        h1 { font-size: 3.5rem; margin-bottom: 15px; font-weight: 900; letter-spacing: -2px; }
        p { color: #8a8a8a; margin-bottom: 35px; font-size: 1.1rem; }
        .btn { 
            padding: 15px 45px; background: #fff; color: #000; text-decoration: none; 
            border-radius: 50px; font-weight: 900; transition: 0.4s; display: inline-block;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(138, 43, 226, 0.6); background: #8a2be2; color: #fff; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <nav>
        <div class="nav-content">
            <div class="logo">B3STTIEEEE</div>
            <ul>
                <li><a href="#">Baza</a></li>
                <li><a href="#">Łączność</a></li>
                <li><a href="#">Repo</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <div class="hero-content">
            <h1>SYSTEM ONLINE.</h1>
            <p>Eksploracja horyzontu zdarzeń w toku...</p>
            <a href="https://github.com/B3sttieeee" class="btn">Autoryzuj Dostęp</a>
        </div>
    </main>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';

        let scene, camera, renderer, disk, stars, holeGlow;

        function createTexture() {
            // Tworzymy teksturę "rozmytej chmury" programowo
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.2, 'rgba(255,255,255,0.5)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            context.fillStyle = gradient;
            context.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 3000);
            camera.position.set(0, 100, 500);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 1. CZARNA DZIURA (Shadow)
            const bhGeo = new THREE.SphereGeometry(80, 64, 64);
            const bhMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const blackHole = new THREE.Mesh(bhGeo, bhMat);
            scene.add(blackHole);

            // Poświata wokół dziury (Atmosphere)
            const glowGeo = new THREE.SphereGeometry(85, 64, 64);
            const glowMat = new THREE.MeshBasicMaterial({ 
                color: 0x8a2be2, 
                transparent: true, 
                opacity: 0.2,
                side: THREE.BackSide 
            });
            holeGlow = new THREE.Mesh(glowGeo, glowMat);
            scene.add(holeGlow);

            // 2. DYSK AKRECYJNY (Gęsty gaz)
            const particleCount = 25000; // Więcej cząsteczek
            const diskGeo = new THREE.BufferGeometry();
            const positions = [];
            const colors = [];
            const sizes = [];
            const color = new THREE.Color();

            for (let i = 0; i < particleCount; i++) {
                const r = Math.random() * 300 + 90;
                const theta = Math.random() * Math.PI * 2;
                
                // Realistyczne wygięcie grawitacyjne
                const x = r * Math.cos(theta);
                const z = r * Math.sin(theta);
                const y = (Math.sin(r * 0.015) * 50) * Math.cos(theta * 0.5) + (Math.random() - 0.5) * 10;

                positions.push(x, y, z);

                // Kolory: od żaru (pomarańcz) po ekstremalną energię (fiolet/błękit)
                const distRatio = (r - 90) / 300;
                if (distRatio < 0.2) {
                    color.setHex(0xffffff); // Najgorętszy środek
                } else if (distRatio < 0.6) {
                    color.setHex(0xffaa00); // Pomarańczowy żar
                } else {
                    color.setHex(0x4b0082); // Chłodniejszy fiolet na brzegach
                }
                
                colors.push(color.r, color.g, color.b);
                sizes.push(Math.random() * 5 + 2);
            }

            diskGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            diskGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            diskGeo.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));

            const diskMat = new THREE.PointsMaterial({
                size: 4,
                map: createTexture(), // Używamy tekstury chmurki zamiast kropki
                vertexColors: true,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            disk = new THREE.Points(diskGeo, diskMat);
            scene.add(disk);

            // 3. GWIAZDY
            const sGeo = new THREE.BufferGeometry();
            const sPos = [];
            for (let i = 0; i < 7000; i++) {
                sPos.push((Math.random() - 0.5) * 3000, (Math.random() - 0.5) * 3000, (Math.random() - 0.5) * 3000);
            }
            sGeo.setAttribute('position', new THREE.Float32BufferAttribute(sPos, 3));
            stars = new THREE.Points(sGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 1.2, transparent: true, opacity: 0.8 }));
            scene.add(stars);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const time = Date.now() * 0.001;
            
            disk.rotation.y += 0.003;
            disk.rotation.z = Math.sin(time * 0.2) * 0.1; // Delikatne falowanie całego dysku
            
            holeGlow.scale.setScalar(1 + Math.sin(time * 2) * 0.05); // Pulsowanie dziury
            
            stars.rotation.y -= 0.0001;
            
            // Kamera
            camera.position.x += (targetX - camera.position.x) * 0.05;
            camera.position.y += (-targetY - camera.position.y) * 0.05;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }

        // Interakcja myszką
        let targetX = 0, targetY = 0;
        window.addEventListener('mousemove', (e) => {
            targetX = (e.clientX - window.innerWidth / 2) * 0.5;
            targetY = (e.clientY - window.innerHeight / 2) * 0.5;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
