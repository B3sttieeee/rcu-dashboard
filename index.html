<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUTT MASTER 2026 | Ultimate 3D</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Biblioteki High-End -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="ui">
        <!-- Overlay startowy -->
        <div id="menu-main" class="glass-panel">
            <h1 class="glitch" data-text="PUTT PARTY">PUTT PARTY</h1>
            <div class="menu-content">
                <button onclick="Game.start()">SINGLE PLAYER</button>
                <button class="secondary" onclick="Multi.initHost()">HOST ROOM</button>
                <button class="secondary" onclick="UI.showJoin()">JOIN FRIENDS</button>
            </div>
        </div>

        <!-- HUD podczas gry -->
        <div id="game-hud" class="hidden">
            <div class="hud-top">
                <div class="hud-card">HOLE <span id="val-hole">1</span></div>
                <div class="hud-card accent">STROKES <span id="val-strokes">0</span></div>
            </div>
            <div class="power-container">
                <div id="power-bar"></div>
            </div>
        </div>

        <!-- Menu dołączania -->
        <div id="menu-join" class="glass-panel hidden">
            <h2>ENTER LOBBY CODE</h2>
            <input type="text" id="join-id" placeholder="...">
            <button onclick="Multi.join()">CONNECT</button>
            <button class="danger" onclick="location.reload()">BACK</button>
        </div>
    </div>

    <!-- Skrypty -->
    <script src="js/physics.js"></script>
    <script src="js/multiplayer.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
